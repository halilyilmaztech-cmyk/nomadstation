                    <ul>
                        <li><strong>Türkiye:</strong> $4000 → 136.000 TL → Rahat yaşam + tasarruf</li>
                        <li><strong>Bali:</strong> $4000 → Aşırı rahat, lüks hayat</li>
                        <li><strong>Portekiz:</strong> $4000 → Rahat, ama turist değil gibi yaşarsın</li>
                    </ul>
                    
                    <blockquote>
                        "En iyi yer nedir? Senin değerinin en yüksek olduğu yer. Bali'de $15/saat = krallık. Portekiz'de $15/saat = yetersiz."
                    </blockquote>
                    
                    <h2>Tavsiye Döngüsü</h2>
                    <ol>
                        <li>Yetenekle kazanç artır (Gözül parayla başla → 40-60/saat)</li>
                        <li>Para düşük yerde yaşa (Bali, Türkiye)</li>
                        <li>3-4 yıl sonra Avrupa'ya taşın (daha prestijli, network</li>
                        <li>Sonra nereyi istersin orada kal</li>
                    </ol>
                `
            }
        ];
        
        let currentFilter = 'all';
        
        function renderBlogGrid() {
            const filtered = currentFilter === 'all' ? articles : articles.filter(a => a.category === currentFilter);
            const html = filtered.map(article => `
                <div class="blog-card" onclick="readArticle(${article.id})">
                    <div class="category">${article.category.toUpperCase()}</div>
                    <h3>${article.title}</h3>
                    <p>${article.excerpt}</p>
                    <div class="meta">
                        <span>${article.date}</span>
                        <span class="read-time">📖 ${article.readTime}</span>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('blogGrid').innerHTML = html;
        }
        
        function filterCategory(category) {
            currentFilter = category;
            renderBlogGrid();
        }
        
        function readArticle(id) {
            const article = articles.find(a => a.id === id);
            if (!article) return;
            
            document.getElementById('blogGrid').style.display = 'none';
            document.getElementById('articleContent').classList.add('active');
            document.getElementById('backBtn').style.display = 'inline-block';
            
            document.getElementById('articleContent').innerHTML = `
                <div style="margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border);">
                    <span style="display: inline-block; padding: 4px 10px; background: rgba(16, 185, 129, 0.2); color: var(--accent-color); border-radius: 4px; font-size: 12px; margin-bottom: 15px;">${article.category.toUpperCase()}</span>
                    <h1 style="font-size: 32px; margin-bottom: 10px;">${article.title}</h1>
                    <div style="display: flex; gap: 20px; color: var(--text-muted); font-size: 14px;">
                        <span>📅 ${article.date}</span>
                        <span>📖 ${article.readTime}</span>
                    </div>
                </div>
                ${article.content}
            `;
            
            window.scrollTo(0, 0);
        }
        
        function backToGrid() {
            document.getElementById('blogGrid').style.display = 'grid';
            document.getElementById('articleContent').classList.remove('active');
            document.getElementById('backBtn').style.display = 'none';
            renderBlogGrid();
        }
        
        // İlk yükleme
        renderBlogGrid();
    </script>
</body>
</html>
